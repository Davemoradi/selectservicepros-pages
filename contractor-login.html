<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contractor Login — SelectServicePros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0c2340;
    --orange: #f05528;
    --orange-hover: #d94a22;
    --white: #ffffff;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: var(--white);
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 20px; height: 20px; }
  .logo span { color: var(--orange); }

  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(20px);
  }
  .login-card h1 {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .login-card h1 em {
    font-style: italic;
    color: var(--orange);
  }
  .login-card .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input::placeholder { color: rgba(255,255,255,0.25); }
  .form-group input:focus { border-color: var(--orange); }

  .forgot-link {
    display: block;
    text-align: right;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    margin-top: -10px;
    margin-bottom: 24px;
    transition: color 0.15s;
  }
  .forgot-link:hover { color: var(--orange); }

  .btn-login {
    width: 100%;
    padding: 16px;
    background: var(--orange);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-login:hover { background: var(--orange-hover); }
  .btn-login:active { transform: scale(0.98); }

  .login-error {
    display: none;
    background: rgba(220,53,69,0.1);
    border: 1px solid rgba(220,53,69,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 16px;
    font-size: 13px;
    color: #ff6b7a;
    line-height: 1.5;
  }
  .login-error.show { display: block; }

  .bottom-links {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
  }
  .bottom-links a {
    color: var(--orange);
    text-decoration: none;
    font-weight: 600;
  }
  .bottom-links a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .login-card { padding: 28px 22px; }
    .login-card h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="logo">
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  Select<span>Service</span>Pros
</div>

<div class="login-card">
  <h1>Welcome back,<br/><em>contractor.</em></h1>
  <p class="subtitle">Sign in to your portal to view leads, manage your profile, and update your membership.</p>

  <!--
    DIRECT FORM POST to BD's login page.
    No JavaScript auth, no fetch, no CORS.
    The browser submits the form natively to BD,
    which handles authentication and redirects.
  -->
  <form id="login-form" method="POST" action="https://contractors.selectservicepros.com/login" onsubmit="return validateForm()">

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" id="login-email" placeholder="you@company.com" autocomplete="email" required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required/>
    </div>

    <a href="https://contractors.selectservicepros.com/login/retrieval" class="forgot-link">Forgot your password?</a>

    <button type="submit" class="btn-login">Sign In</button>

    <div class="login-error" id="login-error"></div>
  </form>

  <div class="bottom-links">
    New to Select Service Pros?<br/>
    <a href="contractor-signup.html">Apply to join the network →</a>
  </div>
</div>

<script>
// Client-side validation only — no auth attempts
function validateForm() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');

  errorEl.classList.remove('show');

  if (!email) {
    errorEl.textContent = 'Please enter your email address.';
    errorEl.classList.add('show');
    return false;
  }
  if (!email.includes('@')) {
    errorEl.textContent = 'Please enter a valid email address.';
    errorEl.classList.add('show');
    return false;
  }
  if (!password) {
    errorEl.textContent = 'Please enter your password.';
    errorEl.classList.add('show');
    return false;
  }

  // Let the form submit natively to BD
  return true;
}
</script>
</body>
</html>
