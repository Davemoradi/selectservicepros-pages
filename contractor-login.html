<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contractor Login — SelectServicePros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500;1,700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0c2340;
    --orange: #f05528;
    --orange-hover: #d94a22;
    --white: #ffffff;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: var(--white);
  }

  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(20px);
  }

  /* ── LOGO inside card ── */
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-circle {
    width: 42px; height: 42px;
    background: var(--orange);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-circle svg { width: 22px; height: 22px; }
  .logo-text {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo-text .t-select { color: var(--white); }
  .logo-text .t-service { color: var(--orange); }
  .logo-text .t-pros { color: var(--white); }

  .login-card h1 {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .login-card h1 em {
    font-style: italic;
    color: var(--orange);
    display: block;
  }
  .login-card .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input::placeholder { color: rgba(255,255,255,0.25); }
  .form-group input:focus { border-color: var(--orange); }

  .forgot-link {
    display: block;
    text-align: right;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    margin-top: -10px;
    margin-bottom: 24px;
    transition: color 0.15s;
  }
  .forgot-link:hover { color: var(--orange); }

  .btn-login {
    width: 100%;
    padding: 16px;
    background: var(--orange);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-login:hover { background: var(--orange-hover); }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
  .btn-login .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .msg {
    display: none;
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  .msg.show { display: block; }
  .msg-error {
    background: rgba(220,53,69,0.1);
    border: 1px solid rgba(220,53,69,0.3);
    color: #ff6b7a;
  }
  .msg-success {
    background: rgba(40,167,69,0.1);
    border: 1px solid rgba(40,167,69,0.3);
    color: #6ce68a;
  }

  .bottom-links {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
  }
  .bottom-links a {
    color: var(--orange);
    text-decoration: none;
    font-weight: 600;
  }
  .bottom-links a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .login-card { padding: 28px 22px; }
    .login-card h1 { font-size: 26px; }
    .logo-text { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="login-card">

  <!-- LOGO — orange circle + white checkmark + Select(white)Service(orange)Pros(white) -->
  <div class="logo">
    <div class="logo-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="t-select">Select</span><span class="t-service">Service</span><span class="t-pros">Pros</span>
    </div>
  </div>

  <h1>Welcome back,<br/><em>contractor.</em></h1>
  <p class="subtitle">Sign in to your portal to view leads, manage your profile, and update your membership.</p>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <a href="https://contractors.selectservicepros.com/login/retrieval" class="forgot-link">Forgot your password?</a>

  <button class="btn-login" id="btn-login" onclick="handleLogin()">
    <span class="btn-text">Sign In</span>
    <div class="spinner"></div>
  </button>

  <div class="msg msg-error" id="msg-error"></div>
  <div class="msg msg-success" id="msg-success"></div>

  <div class="bottom-links">
    New to Select Service Pros?<br/>
    <a href="contractor-signup.html">Apply to join the network →</a>
  </div>
</div>

<script>
function showError(text) {
  document.getElementById('msg-error').textContent = text;
  document.getElementById('msg-error').classList.add('show');
  document.getElementById('msg-success').classList.remove('show');
}
function showSuccess(text) {
  document.getElementById('msg-success').textContent = text;
  document.getElementById('msg-success').classList.add('show');
  document.getElementById('msg-error').classList.remove('show');
}
function setLoading(on) {
  const btn = document.getElementById('btn-login');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  document.getElementById('msg-error').classList.remove('show');
  document.getElementById('msg-success').classList.remove('show');

  if (!email) { showError('Please enter your email address.'); return; }
  if (!email.includes('@')) { showError('Please enter a valid email address.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  setLoading(true);

  try {
    const res = await fetch('/api/bd-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      showSuccess('Login successful! Redirecting to your portal…');
      setTimeout(() => {
        window.location.href = data.redirect || 'https://contractors.selectservicepros.com/account';
      }, 1200);
    } else {
      setLoading(false);
      showError(data.error || 'Incorrect email or password. Please try again.');
    }

  } catch (err) {
    // ANY failure — network, missing API, timeout — always show this
    setLoading(false);
    showError('Incorrect email or password. Please try again.');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !document.getElementById('btn-login').disabled) {
    handleLogin();
  }
});
</script>
</body>
</html>
