<!DOCTYPE html>
<!--
============================================================
SUPABASE MIGRATION — RUN ONCE IN SQL EDITOR BEFORE DEPLOYING
============================================================

-- 1) New columns on existing contractors table
ALTER TABLE contractors
  ADD COLUMN IF NOT EXISTS state text,
  ADD COLUMN IF NOT EXISTS num_technicians int,
  ADD COLUMN IF NOT EXISTS num_vehicles int,
  ADD COLUMN IF NOT EXISTS business_hours jsonb,
  ADD COLUMN IF NOT EXISTS scheduling_system text,
  ADD COLUMN IF NOT EXISTS phone_answered_by text,
  ADD COLUMN IF NOT EXISTS payment_methods text[],
  ADD COLUMN IF NOT EXISTS services_detail jsonb,
  ADD COLUMN IF NOT EXISTS insurance_carrier text,
  ADD COLUMN IF NOT EXISTS insurance_policy_number text,
  ADD COLUMN IF NOT EXISTS insurance_expiration date,
  ADD COLUMN IF NOT EXISTS insurance_doc_url text,
  ADD COLUMN IF NOT EXISTS insurance_verified bool DEFAULT false,
  ADD COLUMN IF NOT EXISTS insurance_verified_at timestamptz,
  ADD COLUMN IF NOT EXISTS agreement_accepted_at timestamptz,
  ADD COLUMN IF NOT EXISTS agreement_accepted_ip text,
  ADD COLUMN IF NOT EXISTS agreement_version text,
  ADD COLUMN IF NOT EXISTS agreement_signed_name text,
  ADD COLUMN IF NOT EXISTS number_of_employees text;

-- 2) New contractor_licenses table
CREATE TABLE IF NOT EXISTS contractor_licenses (
  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  contractor_id uuid REFERENCES contractors(id) ON DELETE CASCADE,
  trade_category text,
  license_type text,
  license_state text,
  license_number text,
  expiration_date date,
  document_url text,
  verified bool DEFAULT false,
  verified_at timestamptz,
  verified_by text,
  notes text,
  created_at timestamptz DEFAULT now(),
  updated_at timestamptz DEFAULT now()
);
CREATE INDEX IF NOT EXISTS idx_contractor_licenses_contractor
  ON contractor_licenses(contractor_id);

-- 3) RLS: contractors can only see/edit their own licenses
ALTER TABLE contractor_licenses ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Contractors manage own licenses" ON contractor_licenses
  FOR ALL
  USING (contractor_id IN (SELECT id FROM contractors WHERE auth_id = auth.uid()))
  WITH CHECK (contractor_id IN (SELECT id FROM contractors WHERE auth_id = auth.uid()));

-- 4) Supabase Storage bucket + RLS
INSERT INTO storage.buckets (id, name, public)
  VALUES ('contractor-docs', 'contractor-docs', true)
  ON CONFLICT (id) DO NOTHING;

CREATE POLICY "Contractors upload to own folder" ON storage.objects
  FOR INSERT
  WITH CHECK (
    bucket_id = 'contractor-docs'
    AND (storage.foldername(name))[1] IN (SELECT id::text FROM contractors WHERE auth_id = auth.uid())
  );
CREATE POLICY "Contractors read own folder" ON storage.objects
  FOR SELECT
  USING (
    bucket_id = 'contractor-docs'
    AND (storage.foldername(name))[1] IN (SELECT id::text FROM contractors WHERE auth_id = auth.uid())
  );
CREATE POLICY "Contractors update own folder" ON storage.objects
  FOR UPDATE
  USING (
    bucket_id = 'contractor-docs'
    AND (storage.foldername(name))[1] IN (SELECT id::text FROM contractors WHERE auth_id = auth.uid())
  );
-->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contractor Dashboard — Select Service Pros</title>
<link rel="icon" href="/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --orange:#f05528; --orange2:#d94a20; --orange-soft:rgba(240,85,40,.08); --orange-tint:#fdece5;
  --navy:#0a1628; --navy2:#122240; --navy-soft:rgba(10,22,40,.06);
  --bg:#f8f7f4; --white:#ffffff; --border:#e5e4e0; --border-strong:#d8d6d0;
  --text1:#111318; --text2:#3d3f44; --text3:#6b6e76; --text4:#9ca0a8;
  --green:#1a8a4a; --green-soft:#e6f9ed; --red:#e53e3e; --red-soft:#fee2e2;
  --yellow:#d97706; --yellow-soft:#fef3c7; --blue:#2563eb; --blue-soft:#eff6ff;
  --radius:12px; --radius-sm:8px; --radius-lg:18px;
  --shadow-sm:0 1px 2px rgba(10,22,40,.04), 0 1px 3px rgba(10,22,40,.03);
  --shadow:0 2px 8px rgba(10,22,40,.04), 0 4px 16px rgba(10,22,40,.04);
  --shadow-md:0 4px 14px rgba(10,22,40,.06), 0 10px 30px rgba(10,22,40,.06);
  --shadow-lg:0 10px 30px rgba(10,22,40,.08), 0 20px 60px rgba(10,22,40,.08);
  --ease:cubic-bezier(.2,.7,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text1);-webkit-font-smoothing:antialiased;line-height:1.45}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text1)}
::selection{background:var(--orange-tint);color:var(--navy)}

/* ===== TOP NAV ===== */
.nav{background:var(--navy);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.04)}
.nav-logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:800;font-size:17px;letter-spacing:-.01em}
.nav-logo .ls{color:var(--orange)}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-contractor{display:flex;align-items:center;gap:10px;padding:6px 10px 6px 6px;background:rgba(255,255,255,.06);border-radius:999px}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#f38961);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.nav-name{color:#fff;font-size:13px;font-weight:600;line-height:1}
.nav-meta{display:flex;gap:6px;margin-top:3px}
.tier-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;background:linear-gradient(180deg,#f4c44a,#d39a21);color:#3a2700}
.tier-badge.basic{background:rgba(255,255,255,.18);color:#fff}
.tier-badge.pro{background:linear-gradient(180deg,#9ec8f5,#5e92d0);color:#0a1628}
.tier-badge.elite{background:linear-gradient(180deg,#f4c44a,#d39a21);color:#3a2700}
.status-pill{font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;letter-spacing:.02em}
.status-pill.pending{background:rgba(217,119,6,.2);color:#fbd38d}
.status-pill.review{background:rgba(37,99,235,.22);color:#a5c4f7}
.status-pill.active{background:rgba(26,138,74,.22);color:#7ad99f}
.nav-logout{color:rgba(255,255,255,.75);font-size:13px;font-weight:600;padding:8px 12px;border-radius:8px;transition:.15s var(--ease)}
.nav-logout:hover{background:rgba(255,255,255,.08);color:#fff}

/* ===== LAYOUT WRAP ===== */
.shell{display:flex;min-height:calc(100vh - 60px)}
.sidebar{display:none;width:240px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:24px 14px;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
body[data-nav="sidebar"] .sidebar{display:block}
body[data-nav="sidebar"] .tabs-top{display:none}
body[data-nav="sidebar"] .shell-main{padding-top:24px}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;transition:.15s var(--ease);margin-bottom:2px}
.sidebar-link:hover{background:var(--bg);color:var(--text1)}
.sidebar-link.active{background:var(--navy);color:#fff}
.sidebar-link svg{flex-shrink:0;opacity:.85}
.sidebar-link .dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--orange);opacity:0;transition:.15s}
.sidebar-link.has-badge .dot{opacity:1}
.sidebar-group{font-size:11px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.08em;padding:14px 12px 6px}

.shell-main{flex:1;min-width:0}
.page{max-width:1160px;margin:0 auto;padding:0 24px 80px}

/* ===== TOP TABS ===== */
.tabs-top{position:sticky;top:60px;background:var(--bg);z-index:50;padding:0 24px;border-bottom:1px solid var(--border)}
.tabs-top-inner{max-width:1160px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs-top-inner::-webkit-scrollbar{display:none}
.tab{position:relative;padding:18px 16px 16px;font-size:14px;font-weight:600;color:var(--text3);white-space:nowrap;cursor:pointer;transition:color .15s var(--ease)}
.tab:hover{color:var(--text1)}
.tab.active{color:var(--navy)}
.tab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;background:var(--orange);border-radius:2px 2px 0 0}
.tab .count{display:inline-block;background:var(--navy);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;margin-left:6px;vertical-align:1px}
.tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--orange);margin-left:6px;vertical-align:2px}

/* ===== HEADER / GREETING ===== */
.page-header{padding:32px 0 20px}
.page-header h1{font-family:'DM Sans',sans-serif;font-weight:800;font-size:clamp(26px,3.2vw,34px);color:var(--navy);letter-spacing:-.025em;line-height:1.1}
.page-header .sub{font-size:14px;color:var(--text3);margin-top:6px}
.page-header .row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}

/* ===== CARDS ===== */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.card.pad{padding:22px}
.card.hover{transition:.2s var(--ease)}
.card.hover:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}

/* ===== STATS ===== */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.stat-label{font-size:11px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-label svg{opacity:.7}
.stat-value{font-family:'DM Sans',sans-serif;font-weight:600;font-size:30px;color:var(--navy);line-height:1;letter-spacing:-.02em}
.stat-sub{font-size:12px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px}
.stat-delta{font-size:11px;font-weight:700;padding:1px 6px;border-radius:999px;background:var(--green-soft);color:var(--green)}
.stat-delta.down{background:var(--red-soft);color:var(--red)}
.stat.accent{background:linear-gradient(135deg,var(--navy) 0%,#162a4a 100%);border:none;color:#fff}
.stat.accent .stat-label{color:rgba(255,255,255,.55)}
.stat.accent .stat-value{color:#fff}
.stat.accent .stat-sub{color:rgba(255,255,255,.65)}

/* ===== SECTION TITLES ===== */
.section{margin-bottom:28px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px}
.section-title{font-family:'DM Sans',sans-serif;font-weight:700;font-size:20px;color:var(--navy);letter-spacing:-.02em}
.section-link{font-size:13px;font-weight:600;color:var(--orange);cursor:pointer}
.section-link:hover{color:var(--orange2)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s var(--ease);white-space:nowrap;border:1px solid transparent}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--orange2);box-shadow:0 4px 12px rgba(240,85,40,.25)}
.btn-primary:disabled{background:var(--border-strong);color:var(--text4);cursor:not-allowed;box-shadow:none}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover:not(:disabled){background:var(--navy2)}
.btn-ghost{background:var(--white);color:var(--text2);border-color:var(--border-strong)}
.btn-ghost:hover:not(:disabled){background:var(--bg);border-color:var(--text4);color:var(--text1)}
.btn-danger{background:var(--white);color:var(--red);border-color:#f3bcbc}
.btn-danger:hover:not(:disabled){background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn-lg{padding:14px 24px;font-size:15px}
.btn:focus-visible{outline:2px solid var(--orange);outline-offset:2px}

/* ===== STEPPER WIZARD (Pending Profile banner) ===== */
.wizard{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow:hidden;position:relative}
.wizard-top{background:linear-gradient(135deg,var(--navy) 0%,#18304f 60%,#1f3a5e 100%);color:#fff;padding:28px 32px 26px;position:relative;overflow:hidden}
.wizard-top::before{content:"";position:absolute;right:-80px;top:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(240,85,40,.18) 0%,transparent 70%)}
.wizard-top::after{content:"";position:absolute;right:40px;bottom:-40px;width:120px;height:120px;border:1px solid rgba(255,255,255,.07);border-radius:50%}
.wiz-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:10px}
.wiz-eyebrow .pulse{width:8px;height:8px;background:var(--orange);border-radius:50%;box-shadow:0 0 0 0 rgba(240,85,40,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(240,85,40,.55)}70%{box-shadow:0 0 0 10px rgba(240,85,40,0)}100%{box-shadow:0 0 0 0 rgba(240,85,40,0)}}
.wiz-title{font-family:'DM Sans',sans-serif;font-weight:800;font-size:clamp(22px,2.8vw,30px);letter-spacing:-.025em;line-height:1.1;max-width:640px}
.wiz-subtitle{font-size:14px;color:rgba(255,255,255,.72);margin-top:8px;max-width:580px}
.wiz-progress{margin-top:22px;display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.wiz-bar{flex:1;height:10px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;position:relative}
.wiz-bar-fill{position:absolute;inset:0;width:0;background:linear-gradient(90deg,var(--orange) 0%,#ff7a4d 100%);border-radius:999px;transition:width .6s var(--ease);box-shadow:0 0 20px rgba(240,85,40,.4)}
.wiz-pct{font-family:'DM Sans',sans-serif;font-weight:600;font-size:22px;color:#fff;min-width:54px;text-align:right}

.wizard-body{display:grid;grid-template-columns:260px 1fr;min-height:420px}
.wiz-steps{border-right:1px solid var(--border);padding:18px 10px;background:#fafaf7;overflow-y:auto}
.wiz-step{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:10px;cursor:pointer;transition:.15s var(--ease);margin-bottom:2px}
.wiz-step:hover{background:var(--white)}
.wiz-step.active{background:var(--white);box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.wiz-step-ico{width:26px;height:26px;border-radius:50%;border:2px solid var(--border-strong);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--white);transition:.2s var(--ease);margin-top:1px}
.wiz-step.done .wiz-step-ico{background:var(--green);border-color:var(--green)}
.wiz-step.done .wiz-step-ico svg{color:#fff;opacity:1}
.wiz-step-ico svg{opacity:0;transition:.2s}
.wiz-step.active .wiz-step-ico{border-color:var(--orange)}
.wiz-step-num{font-size:11px;font-weight:700;color:var(--text4)}
.wiz-step.done .wiz-step-num{display:none}
.wiz-step-txt{flex:1;min-width:0}
.wiz-step-title{font-size:13px;font-weight:600;color:var(--text1);line-height:1.3}
.wiz-step.done .wiz-step-title{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--border-strong)}
.wiz-step-sub{font-size:11px;color:var(--text4);margin-top:2px}
.wiz-step-current{width:3px;background:var(--orange);border-radius:2px;align-self:stretch;margin:-2px 0;opacity:0;transition:.15s}
.wiz-step.active .wiz-step-current{opacity:1}

.wiz-content{padding:30px 34px;display:flex;flex-direction:column}
.wiz-content-head{margin-bottom:20px}
.wiz-tag{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.wiz-h{font-family:'DM Sans',sans-serif;font-weight:700;font-size:24px;color:var(--navy);letter-spacing:-.02em;line-height:1.2}
.wiz-d{font-size:14px;color:var(--text3);margin-top:4px;max-width:520px}

.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.01em}
.field .hint{font-size:11px;color:var(--text4);margin-top:5px}
.input,.textarea,.select{width:100%;padding:10px 12px;background:var(--white);border:1px solid var(--border-strong);border-radius:10px;font-size:14px;color:var(--text1);transition:.15s var(--ease);font-family:inherit}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-soft)}
.textarea{min-height:84px;resize:vertical;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}

/* category / zip pills */
.pill-picker{display:flex;flex-wrap:wrap;gap:6px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--white);border:1px solid var(--border-strong);border-radius:999px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:.15s var(--ease)}
.pill:hover{border-color:var(--text4);color:var(--text1)}
.pill.selected{background:var(--navy);border-color:var(--navy);color:#fff}
.pill.zip{background:var(--orange-soft);border-color:transparent;color:var(--orange2);font-weight:600}
.pill .x{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;opacity:.6}
.pill:hover .x{opacity:1}
.zip-input{display:flex;gap:8px}
.zip-input .input{max-width:160px}

/* file upload */
.uploader{border:1.5px dashed var(--border-strong);border-radius:12px;padding:20px;background:var(--bg);text-align:center;transition:.15s var(--ease);cursor:pointer;position:relative}
.uploader:hover{border-color:var(--orange);background:var(--orange-soft)}
.uploader.has-file{border-style:solid;border-color:var(--green);background:#f3fbf5;text-align:left;padding:14px}
.uploader-ico{width:36px;height:36px;margin:0 auto 8px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.uploader-title{font-size:13px;font-weight:600;color:var(--text2)}
.uploader-sub{font-size:11px;color:var(--text4);margin-top:3px}
.file-row{display:flex;align-items:center;gap:12px}
.file-thumb{width:44px;height:44px;border-radius:8px;background:var(--white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:600;color:var(--text1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{font-size:11px;color:var(--text3);margin-top:2px}
.file-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:.15s}
.icon-btn:hover{background:var(--white);color:var(--text1)}

.wiz-missing{background:#fff8e6;border:1px solid #f5d97f;border-left:4px solid #e6a700;border-radius:10px;padding:14px 16px;margin:0 0 20px;color:#6b4d00}
.wiz-missing-title{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wiz-missing-list{margin:0;padding-left:22px;font-size:13.5px;line-height:1.7;color:#533c00}
.wiz-missing-list li{margin:2px 0}
.wiz-foot{margin-top:auto;padding-top:20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px}
.wiz-foot .muted{font-size:12px;color:var(--text4)}

/* ===== LEADS ===== */
.filters{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chip{padding:7px 14px;background:var(--white);border:1px solid var(--border);border-radius:999px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;transition:.15s var(--ease);display:inline-flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--text4);color:var(--text1)}
.chip.active{background:var(--navy);border-color:var(--navy);color:#fff}
.chip .c{font-size:11px;padding:0 6px;border-radius:999px;background:var(--border);color:var(--text3);font-weight:700;min-width:18px;text-align:center}
.chip.active .c{background:rgba(255,255,255,.18);color:#fff}
.search{flex:1;min-width:200px;max-width:280px;display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--white);border:1px solid var(--border);border-radius:999px;color:var(--text3)}
.search:focus-within{border-color:var(--orange);color:var(--text1);box-shadow:0 0 0 3px var(--orange-soft)}
.search input{flex:1;border:none;outline:none;font-size:13px;background:transparent}

.tier.current::before{content:"Current";position:absolute;top:-9px;right:14px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:.05em;text-transform:uppercase}
.tier-name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:20px;color:var(--navy)}
.tier-price{font-size:13px;color:var(--text3);margin-top:4px}
.tier-ul{list-style:none;margin:14px 0 16px;padding:0;font-size:13px;color:var(--text2)}
.tier-ul li{display:flex;align-items:center;gap:8px;padding:4px 0}
.tier-ul li svg{color:var(--green);flex-shrink:0}

.billing-break{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.break-item{background:var(--bg);border-radius:10px;padding:16px}
.break-lbl{font-size:11px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em}
.break-val{font-family:'DM Sans',sans-serif;font-weight:800;font-size:26px;color:var(--navy);letter-spacing:-.02em;margin-top:4px}

/* ===== SETTINGS toggles ===== */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-info h4{font-size:14px;font-weight:600;color:var(--text1)}
.toggle-info p{font-size:12.5px;color:var(--text3);margin-top:2px}
.switch{position:relative;width:40px;height:22px;background:var(--border-strong);border-radius:999px;cursor:pointer;transition:.2s var(--ease);flex-shrink:0}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s var(--ease);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on{background:var(--green)}

.danger-zone{background:#fff5f5;border:1px solid var(--red-soft);border-radius:var(--radius);padding:20px;margin-top:20px}
.danger-zone h3{font-family:'DM Sans',sans-serif;font-weight:600;color:var(--red);font-size:18px}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:56px 20px}
.empty svg{margin:0 auto 16px}

/* ===== TOAST ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:12px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;z-index:1000;transition:transform .3s var(--ease);max-width:92vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast .undo{margin-left:8px;padding:4px 10px;background:rgba(255,255,255,.15);border-radius:6px;font-weight:700;font-size:12.5px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.toast .undo:hover{background:rgba(255,255,255,.25)}
.toast .close{opacity:.7;cursor:pointer;margin-left:4px}
.toast .close:hover{opacity:1}

/* ===== TABS CONTENT FADE ===== */
.tab-panel{animation:fadein .25s var(--ease)}

/* ===== BANNER VARIANTS ===== */
body[data-banner="hero"] .wizard{min-height:72vh}

/* ===== SAVE INDICATOR ===== */
.save-indicator{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text4);opacity:0;transition:.2s;margin-left:10px;vertical-align:3px}
.save-indicator.show{opacity:1}
.save-indicator.saving{color:var(--text3)}

@keyframes blink{50%{opacity:.3}}

/* ===== TWEAKS PANEL ===== */
.tweaks{position:fixed;bottom:20px;right:20px;width:300px;background:var(--white);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);z-index:200;overflow:hidden;display:none}

.tweaks-head{padding:12px 16px;background:var(--navy);color:#fff;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;letter-spacing:.02em}
.tweaks-head .close{cursor:pointer;opacity:.7}
.tweaks-head .close:hover{opacity:1}
.tweaks-body{padding:16px;max-height:60vh;overflow-y:auto}
.tweak{margin-bottom:14px}
.tweak-lbl{font-size:11px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.tweak-options{display:flex;gap:4px;background:var(--bg);padding:3px;border-radius:8px}

.tweak-options button.on{background:var(--white);color:var(--navy);box-shadow:var(--shadow-sm)}

.slider-wrap{display:flex;align-items:center;gap:10px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--orange)}
.slider-wrap .val{font-size:12px;font-weight:700;color:var(--navy);min-width:34px;text-align:right;font-variant-numeric:tabular-nums}

/* ===== CATEGORY ACCORDION ===== */
.cat-accordion{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--white)}
.cat-row{border-bottom:1px solid var(--border);transition:background .15s}
.cat-row:last-child{border-bottom:none}
.cat-row.selected{background:#fcfbf9}
.cat-row.open{background:var(--bg)}
.cat-head{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;user-select:none}
.cat-head:hover{background:var(--bg)}
.cat-check{display:flex;align-items:center;cursor:pointer}
.cat-check input{width:18px;height:18px;accent-color:var(--orange);cursor:pointer}
.cat-name{font-size:15px;font-weight:600;color:var(--navy)}
.cat-meta{font-size:12px;color:var(--text4);font-weight:500}
.cat-row.selected .cat-meta{color:var(--orange);font-weight:600}
.cat-chev{color:var(--text3);transition:transform .2s var(--ease)}
.cat-row.open .cat-chev{transform:rotate(180deg)}
.cat-body{padding:8px 16px 18px 48px;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px;animation:slidedown .2s var(--ease)}

.sub-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:.12s var(--ease)}
.sub-item:hover{background:var(--white)}
.sub-item input{accent-color:var(--orange);cursor:pointer}
.sub-item.on{color:var(--text1);font-weight:500}

/* ===== HOURS TABLE ===== */
.hours-table{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.hours-row{display:grid;grid-template-columns:60px 140px 1fr auto;align-items:center;gap:14px;padding:12px 14px;border-bottom:1px solid var(--border);transition:.15s}
.hours-row:last-child{border-bottom:none}
.hours-row.closed{background:#fafaf7}
.hours-row.closed .hr-times,.hours-row.closed .hr-day{opacity:.5}

.hr-toggle{display:flex;align-items:center;gap:10px}
.hr-status{font-size:12px;font-weight:600;color:var(--text3);min-width:44px}
.switch.sm{width:32px;height:18px}
.switch.sm::after{width:14px;height:14px}
.switch.sm.on::after{left:16px}
.hr-times{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.input.time{max-width:120px;padding:7px 10px;font-size:13px}

.radio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px}
.radio-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border-strong);border-radius:10px;cursor:pointer;font-size:13px;color:var(--text2);transition:.15s var(--ease);background:var(--white)}
.radio-item:hover{border-color:var(--text4);color:var(--text1)}
.radio-item.on{border-color:var(--orange);background:var(--orange-soft);color:var(--orange2);font-weight:600}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(10,22,40,.55);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .2s var(--ease)}

.modal-foot{padding:18px 24px;display:flex;flex-direction:column;gap:12px}

.check-row input:disabled{cursor:not-allowed;opacity:.4}

function licenseForTrade(trade){
  return state.credentials.licenses.find(l=>l.trade===trade);
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const then = new Date(dateStr).getTime();
  if(isNaN(then)) return null;
  return Math.floor((then - Date.now())/(1000*60*60*24));
}
function expiryBadge(dateStr){
  // Returns a small inline badge HTML for expiry urgency (or empty string).
  const d = daysUntil(dateStr);
  if(d===null) return '';
  if(d < 0) return `<span class="exp-badge exp-expired">Expired</span>`;
  if(d <= 30) return `<span class="exp-badge exp-soon">Expires in ${d} day${d===1?'':'s'}</span>`;
  if(d <= 60) return `<span class="exp-badge exp-warn">Expires in ${d} days</span>`;
  return '';
}
function addLicenseForTrade(trade){
  if(licenseForTrade(trade)) return;
  const defaultType = trade==='HVAC' ? 'State HVAC / Mechanical License'
    : trade==='Plumbing' ? 'State Plumbing License (Master)'
    : trade==='Electrical' ? 'State Electrical License (Master)'
    : 'Other';
  const licState = state.profile.state || '';
  // Optimistic local row; swap in the real UUID once the insert returns.
  const tempId = 'tmp_'+Date.now();
  const local = {
    id: tempId, trade, type: defaultType, state: licState,
    number:'', exp:'', file:'', verified:false, verifiedAt:null, notes:'',
  };
  state.credentials.licenses.push(local);
  if(!state.contractorId) return;
  (async ()=>{
    try {
      const { data, error } = await sb.from('contractor_licenses').insert({
        contractor_id: state.contractorId,
        trade_category: trade,
        license_type: defaultType,
        license_state: licState,
      }).select().single();
      if(error){ console.error('addLicense failed', error); return; }
      local.id = data.id;
      render();
    } catch(e){ console.error(e); }
  })();
}
function removeLicense(id){
  const l = state.credentials.licenses.find(x=>x.id===id);
  if(!l) return;
  state.credentials.licenses = state.credentials.licenses.filter(x=>x.id!==id);
  if(l.trade && state.categories.has(l.trade) && LICENSED_TRADES.includes(l.trade)){
    state.categories.delete(l.trade);
    delete state.servicesDetail[l.trade];
  }
  if(!String(id).startsWith('tmp_')){
    sb.from('contractor_licenses').delete().eq('id', id)
      .then(({error})=>{ if(error) console.error('removeLicense failed', error); });
  }
  // Persist services set since we may have dropped a category.
  markSaving();
}

function timeAgo(mins){
  if(mins<1)return 'just now';
  if(mins<60)return `${Math.floor(mins)} min ago`;
  if(mins<60*24)return `${Math.floor(mins/60)} hr ago`;
  return `${Math.floor(mins/60/24)} d ago`;
}
function fmtSeconds(s){
  if(s<60)return `${s}s`;
  if(s<3600)return `${Math.floor(s/60)}m`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}

function completion(){

function getDoneSteps(){
  // Evaluate each step's check() against current state. Each check is a
  // predicate defined on the STEP (e.g. state.profile.description?.length>40).
  // Defensive try/catch: an error in one step's check (e.g. state shape
  // missing after a bad load) should not mark every step as done.
  return STEPS.map(s=>{
    try { return !!s.check(); } catch(e){ console.error('STEP check failed', s.key, e); return false; }
  });
}

function stepContentHTML(step, idx){
  let body = '';

  else if(step.key==='zips') body = stepZips();
  else if(step.key==='operations') body = stepOperations();
  else if(step.key==='licenses') body = stepLicenses();

  const isLast = idx === STEPS.length-1;
  const stepDone = (() => { try { return !!step.check(); } catch(e){ return false; } })();

         <div class="wiz-missing-title">${iconAlert(16)} This step isn't complete yet — you can come back to it</div>

}

// Returns a list of plain-English reasons a step isn't complete yet.
// The list mirrors each STEP.check() predicate in STEPS (above). When
// everything required is present, the returned list is empty.
function missingFieldsFor(key){
  const out = [];
  switch(key){
    case 'description': {
      const len = (state.profile.description||'').length;
      if(len === 0) out.push('Business description (aim for 60–200 characters)');
      else if(len <= 40) out.push(`Business description is too short — you have ${len} characters, need at least 41`);
      break;
    }
    case 'years': {
      if(!(state.profile.years>0)) out.push('Years in business');
      break;
    }
    case 'categories': {
      if(state.categories.size===0){
        out.push('Select at least one service category');
      } else {
        for(const c of state.categories){
          if((state.servicesDetail[c]||[]).length===0){
            out.push(`At least one specific service under "${c}"`);
          }
          if(LICENSED_TRADES.includes(c) && !licenseForTrade(c)){
            out.push(`A license record for ${c} (added on the Licenses step)`);
          }
        }
      }
      break;
    }
    case 'zips': {
      if(state.zips.length===0) out.push('At least one ZIP code you serve');
      break;
    }
    case 'operations': {
      if(!(state.operations.technicians>0)) out.push('Number of technicians on your team');
      if(!state.operations.phoneAnswered) out.push('Who answers your business phone');
      if(!(state.operations.payments && state.operations.payments.size>0)) out.push('At least one payment method you accept');
      const hasAnyOpenDay = DAYS.some(d=>state.operations.hours[d].open || state.operations.hours[d].open24);
      if(!state.operations.hoursConfirmed){
        out.push(hasAnyOpenDay
          ? 'Confirm your business hours (even if the defaults are right, toggle or adjust one day to confirm)'
          : 'Business hours for at least one day of the week');
      } else if(!hasAnyOpenDay){
        out.push('Set at least one day as open (or toggle 24/7)');
      }
      break;
    }
    case 'licenses': {
      const licensedSelected = [...state.categories].filter(c=>LICENSED_TRADES.includes(c));
      if(licensedSelected.length===0) break;
      for(const c of licensedSelected){
        const l = licenseForTrade(c);
        if(!l){ out.push(`Add a ${c} license`); continue; }
        if(!l.number) out.push(`${c} license: license number`);
        if(!l.type)   out.push(`${c} license: license type`);
        if(!l.state)  out.push(`${c} license: issuing state`);
        if(!l.exp)    out.push(`${c} license: expiration date`);
        if(!l.file)   out.push(`${c} license: upload license document`);
      }
      break;
    }
    case 'insurance': {
      const i = state.credentials.insurance;
      if(!i.carrier) out.push('Insurance carrier name');
      if(!i.policy)  out.push('Policy number');
      if(!i.exp)     out.push('Policy expiration date');
      if(!i.file)    out.push('Upload your Certificate of Insurance (COI)');
      break;
    }
  }
  return out;
}

function stepHelper(k){
  const M = {
    description:"This is what homeowners see first on your profile card. Keep it human, mention what makes you different.",
    years:"Contractors with 3+ years of history book 40% more leads on SSP.",
    categories:"Pick only what you actually handle. Licensed trades (HVAC, Plumbing, Electrical) require a verified state license.",
    zips:"We only route leads whose ZIP is in your list. Add as many as you cover.",
    operations:"Hours, team size, and how you handle payments. Helps homeowners pick the right pro.",
    licenses:"For HVAC, Plumbing, or Electrical work. Other trades don't need a license on file — just insurance.",
    insurance:"General liability, current. Required for every contractor on the platform, regardless of trade.",
  };
  return M[k]||'';
}

// Map UI field names → DB column names on contractor_licenses.
const LICENSE_FIELD_MAP = {
  trade: 'trade_category',
  type: 'license_type',
  state: 'license_state',
  number: 'license_number',
  exp: 'expiration_date',
  file: 'document_url',
  verified: 'verified',
  verifiedAt: 'verified_at',
  notes: 'notes',
};
const _licPersistQueue = {}; // licId -> {pending: {col:val,...}, timer}
function updateLicense(id, field, value){
  const lic = state.credentials.licenses.find(l=>l.id===id);
  if(!lic) return;
  lic[field] = value;
  // Changing any field invalidates prior verification.
  if(field !== 'verified' && field !== 'verifiedAt') lic.verified = false;
  markSaving();
  // Only re-render for field changes that cause layout shifts (selects/dates/verified/file).
  // Text fields like `number` MUST NOT re-render on every keystroke — it blows away
  // the <input> DOM node, killing focus and dropping the last typed character.
  // The status pill (Incomplete/Pending/Verified) that depends on `number` will
  // update on the next natural re-render (blur, step change, etc).
  const TEXT_FIELDS = ['number', 'notes'];
  if(!TEXT_FIELDS.includes(field)) render();

  // Debounce a per-license DB update.
  if(String(id).startsWith('tmp_')) return; // not yet inserted — skip
  const col = LICENSE_FIELD_MAP[field];
  if(!col) return;
  let dbVal = value;
  if(field === 'exp') dbVal = value || null;
  if(field === 'verified') dbVal = !!value;
  if(!_licPersistQueue[id]) _licPersistQueue[id] = { pending:{}, timer:null };
  const q = _licPersistQueue[id];
  q.pending[col] = dbVal;
  // Also reset verification server-side when the user edits a field.
  if(field !== 'verified' && field !== 'verifiedAt') q.pending.verified = false;
  clearTimeout(q.timer);
  q.timer = setTimeout(async ()=>{
    const payload = q.pending;
    q.pending = {};
    try {
      const { error } = await sb.from('contractor_licenses')
        .update(payload).eq('id', id);
      if(error) console.error('updateLicense DB error', error);
    } catch(e){ console.error('updateLicense exception', e); }
  }, 500);
}

// Opens a hidden file input, uploads the chosen file to Supabase Storage
// under the contractor's folder, and writes the public URL back to the DB.
function fakeUpload(kind, replace){
  // Legacy name kept — only 'insurance' is still supported; license uploads
  // go through fakeLicenseUpload below.
  if(kind !== 'insurance') return;
  pickFile(async (file)=>{
    if(!validateUpload(file)) return;
    try {
      const url = await uploadDoc(file, 'insurance.' + fileExt(file));
      state.credentials.insurance.file = url;
      await sb.from('contractors')
        .update({ insurance_doc_url: url, insurance_verified: false })
        .eq('id', state.contractorId);
      state.credentials.insurance.verified = false;
      render();
      toast(replace?'File replaced · we\'ll verify soon':'Uploaded · we\'ll verify soon','success');
    } catch(e){
      console.error('insurance upload failed', e);
      toast('Upload failed — try again','error');
    }
  });
}

async function fakeLicenseUpload(licId, replace){
  pickFile(async (file)=>{
    if(!validateUpload(file)) return;
    try {
      const url = await uploadDoc(file, `license-${licId}.${fileExt(file)}`);
      const lic = state.credentials.licenses.find(l=>l.id===licId);
      if(lic){ lic.file = url; lic.verified = false; }
      await sb.from('contractor_licenses')
        .update({ document_url: url, verified: false })
        .eq('id', licId);
      render();
      toast(replace?'File replaced · we\'ll verify soon':'Uploaded · we\'ll verify soon','success');
    } catch(e){
      console.error('license upload failed', e);
      toast('Upload failed — try again','error');
    }
  });
}

// ---- helpers ----
function pickFile(cb){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/pdf,image/jpeg,image/png';
  input.onchange = ()=>{ if(input.files && input.files[0]) cb(input.files[0]); };
  input.click();
}
function validateUpload(file){
  if(file.size > 10 * 1024 * 1024){ toast('File too large — 10 MB max','error'); return false; }
  const ok = ['application/pdf','image/jpeg','image/jpg','image/png'];
  if(!ok.includes(file.type)){ toast('PDF, JPG, or PNG only','error'); return false; }
  return true;
}
function fileExt(file){
  const fromName = (file.name||'').split('.').pop();
  if(fromName && fromName.length<=4) return fromName.toLowerCase();
  const map = {'application/pdf':'pdf','image/jpeg':'jpg','image/jpg':'jpg','image/png':'png'};
  return map[file.type] || 'bin';
}
async function uploadDoc(file, pathSuffix){
  if(!state.contractorId) throw new Error('No contractorId');
  const path = `${state.contractorId}/${pathSuffix}`;
  const { error: upErr } = await sb.storage.from('contractor-docs')
    .upload(path, file, { upsert: true, contentType: file.type });
  if(upErr) throw upErr;
  const { data: urlData } = sb.storage.from('contractor-docs').getPublicUrl(path);
  return urlData.publicUrl;
}

function canSignAgreement(){
  const a = state.agreement;
  // Accept any legal name the contractor types — it doesn't need to match the
  // profile name exactly (legal name may differ from display name, and profile
  // typos shouldn't block signing). We require at least 2 words and only
  // letters/spaces/hyphens/apostrophes/periods (standard name characters).
  const typed = (a.typedName || '').trim();
  const looksLikeName = /^[A-Za-z][A-Za-z .'\-]*\s+[A-Za-z][A-Za-z .'\-]*$/.test(typed);
  return a.scrolledEnd && a.readAgreed && a.authorized && looksLikeName;
}

async function acceptAgreement(){
  if(!canSignAgreement()) return;
  const signedName = state.agreement.typedName.trim();

  // 1) IP capture (best-effort).
  let ip = '';
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    if(r.ok){ const j = await r.json(); ip = j.ip||''; }
  } catch(e){ /* non-fatal */ }

  const now = new Date().toISOString();
  state.agreementRecord = {
    agreement_accepted_at: now,
    agreement_accepted_ip: ip,
    agreement_version: AGREEMENT_VERSION,
    agreement_signed_name: signedName,
  };

  // 2) Persist to contractors row + flip status.
  try {
    const { error } = await sb.from('contractors').update({
      agreement_accepted_at: now,
      agreement_accepted_ip: ip,
      agreement_version: AGREEMENT_VERSION,
      agreement_signed_name: signedName,
      status: 'Pending Review',
    }).eq('id', state.contractorId);
    if(error){
      console.error('acceptAgreement DB failed', error);
      toast('Could not submit — try again','error');
      return;
    }
  } catch(e){
    console.error('acceptAgreement exception', e);
    toast('Could not submit — try again','error');
    return;
  }

  // 3) GHL webhook (best-effort — don't block UX on failure).
  try {
    if(GHL_REVIEW_WEBHOOK && !GHL_REVIEW_WEBHOOK.startsWith('TODO')){
      await fetch(GHL_REVIEW_WEBHOOK, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          type:'submit_for_review',
          contractor_id: state.contractorId,
          firstName: state.profile.firstName,
          lastName: state.profile.lastName,
          name: `${state.profile.firstName} ${state.profile.lastName}`.trim(),
          company: state.profile.company,
          email: state.profile.email,
          phone: state.profile.phone,
          tier: state.tierBadge,
          agreement_version: AGREEMENT_VERSION,
          signed_at: now,
          signed_ip: ip,
        }),
      });
    }
  } catch(e){ console.error('GHL webhook failed', e); }

  state.state = 'review';

let lastLeadAction = null;
async function acceptLead(id, fee){
  const l = state.leads.find(x=>x.id===id); if(!l) return;
  const prev = l.status;
  const now = new Date().toISOString();
  const responseSeconds = l.created_at ? Math.floor((Date.now() - new Date(l.created_at).getTime())/1000) : null;
  const useFee = (typeof fee==='number') ? fee : (l.fee || 29);
  l.status = 'Accepted';
  lastLeadAction = {id, prev, fee:useFee};
  render();
  try {
    await sb.from('leads').update({
      status: 'Accepted', accepted_at: now, responded_at: now,
      lead_fee: useFee, response_time_seconds: responseSeconds
    }).eq('id', id);
 } catch(e){ console.error('acceptLead failed', e); }

  // Fire GHL "Homeowner — Matched With Pro" workflow so Email 6 goes out.
  fireHomeownerMatched(l).catch(e => console.error('homeowner_matched webhook failed (non-fatal):', e));

  toast(`Accepted — $${useFee} charged. Homeowner's info is in your leads.`,'success',true);
}

async function fireHomeownerMatched(l){
  if(!l || !l.email){
    console.warn('homeowner_matched: no homeowner email on lead, skipping', l && l.id);
    return;
  }
  const WEBHOOK = 'https://services.leadconnectorhq.com/hooks/QfDToN545k1TOpFZa5AQ/webhook-trigger/cSb176GBaN3hMu0573QO';
  const p = state.profile || {};
  const firstName = (l.name||'').trim().split(/\s+/)[0] || '';
  const contractorName = [p.firstName, p.lastName].filter(Boolean).join(' ').trim();
  const payload = {
    type: 'homeowner_matched',
    lead_id: l.id,
    homeowner_email: l.email,
    homeowner_first_name: firstName,
    homeowner_name: l.name || '',
    homeowner_phone: l.phone || '',
    homeowner_zip: l.zip || '',
    homeowner_address: l.address || '',
    service_type: l.service || '',
    urgency: l.urgency || '',
    contractor_id: state.contractorId,
    contractor_name: contractorName,
    contractor_company: p.company || '',
    contractor_phone: p.phone || '',
    contractor_email: p.email || '',
    business_description: p.description || '',
    years_in_business: p.years != null ? String(p.years) : '',
    dashboard_url: window.location.origin + '/contractor-dashboard.html',
  };
  const resp = await fetch(WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if(!resp.ok){
    throw new Error('homeowner_matched webhook HTTP ' + resp.status);
  }
}
async function passLead(id){
  const l = state.leads.find(x=>x.id===id); if(!l) return;
  const now = new Date().toISOString();
  const responseSeconds = l.created_at ? Math.floor((Date.now() - new Date(l.created_at).getTime())/1000) : null;
  lastLeadAction = {id, prev:l.status};
  l.status='Passed';
  render();
  try {
    await sb.from('leads').update({
      status: 'Passed', responded_at: now, response_time_seconds: responseSeconds
    }).eq('id', id);
  } catch(e){ console.error('passLead failed', e); }
  toast(`Passed on ${l.name}'s request.`,'success',true);
}
function undoLast(){
  if(!lastLeadAction) return;
  const l = state.leads.find(x=>x.id===lastLeadAction.id);
  if(l){ l.status=lastLeadAction.prev; }
  lastLeadAction=null;
  hideToast();
  render();
  toast('Undone','success');
}

function fmtDate(d){

async function requestAccountDeletion(){
  // We don't hard-delete from the client. Mark the row and fire a webhook so
  // ops gets a ticket to purge within 30 days (per privacy policy).
  if(!confirm('Are you absolutely sure? This cannot be undone.')) return;
  try {
    await sb.from('contractors').update({
      status: 'Deletion Requested',
      deletion_requested_at: new Date().toISOString(),
    }).eq('id', state.contractorId);
    if(GHL_REVIEW_WEBHOOK && !GHL_REVIEW_WEBHOOK.startsWith('TODO')){
      fetch(GHL_REVIEW_WEBHOOK, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          type:'account_deletion_requested',
          contractor_id: state.contractorId,
          email: state.profile.email,
          company: state.profile.company,
        }),
      }).catch(()=>{});
    }
    toast('Account deletion requested. You will receive a confirmation email.','error');
  } catch(e){
    console.error(e); toast('Could not submit deletion request','error');
  }
}

// ==================== SAVING INDICATOR + PERSISTENCE ====================
// markSaving() is called from every field oninput/onchange in the Profile,
// Operations, Services, and Insurance tabs. It (a) pulses the "Saving…"
// indicator in the page header, and (b) debounces a real Supabase write.
let saveTimer = null;
let saveIndicatorTimer = null;
function markSaving(){
  const el = document.getElementById('saveInd');
  if(el){
    el.className='save-indicator show saving';
    el.innerHTML='<span class="dot-anim"></span>Saving';
  }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    const ok = await persistProfile();
    if(el){
      if(ok){ el.className='save-indicator show saved'; el.innerHTML=iconCheck(12)+' Saved'; }
      else  { el.className='save-indicator show error'; el.innerHTML=iconX(12)+' Error'; }
    }
    clearTimeout(saveIndicatorTimer);
    saveIndicatorTimer = setTimeout(()=>{ if(el) el.className='save-indicator saved'; }, 1400);
  }, 500);
}

  if(!state.contractorId) return false;
  const p = state.profile, o = state.operations, i = state.credentials.insurance;
  const payload = {
    first_name: p.firstName || null,
    last_name: p.lastName || null,
    company_name: p.company || null,
    business_description: p.description || null,
    years_in_business: p.years ? Number(p.years) : null,
    number_of_employees: p.employees ? String(p.employees) : null,
    phone: p.phone || null,
    website_url: p.website || null,
    state: p.state || null,
    service_zips: state.zips.join(','),
    service_categories: Array.from(state.categories).join(','),
    services_detail: state.servicesDetail,
    num_technicians: o.technicians ? Number(o.technicians) : null,
    num_vehicles: o.vehicles ? Number(o.vehicles) : null,
    business_hours: Object.assign({}, o.hours, { _confirmed: !!o.hoursConfirmed }),
    scheduling_system: o.scheduling || null,
    phone_answered_by: o.phoneAnswered || null,
    payment_methods: Array.from(o.payments),
    insurance_carrier: i.carrier || null,

  try {
    const { error } = await sb.from('contractors').update(payload).eq('id', state.contractorId);
    if(error){ console.error('persistProfile error', error); return false; }
    return true;
  } catch(e){ console.error('persistProfile exception', e); return false; }
}

// ==================== DATA LOADING ====================
async function loadContractor(authId){
  // Retry once on empty: when a user lands here fresh from a password reset
  // the SDK may not yet have persisted the JWT to storage, so the first RLS
  // check runs with auth.uid() = null and returns no rows. A short wait +
  // second attempt almost always resolves this without the user seeing an
  // error. Using maybeSingle() instead of single() so "no row" isn't treated
  // as a query error.
  async function fetchOnce(){
    return await sb.from('contractors')
      .select('*').eq('auth_id', authId).maybeSingle();
  }

  let { data, error } = await fetchOnce();
  if(!error && !data){
    // One retry with a small delay — covers the session-hydration race.
    await new Promise(r=>setTimeout(r, 600));
    ({ data, error } = await fetchOnce());
  }

  if(error || !data){
    console.error('loadContractor failed', error);
    showFatalError("We couldn't find your contractor account. If you just signed up, try again in a minute — otherwise contact support.");
    return false;
  }

  state.contractorId = data.id;
  state.state = uiStatusFrom(data.status);
  state.tierBadge = data.membership_tier || 'Basic';

  state.profile = {
    firstName: data.first_name || '',
    lastName: data.last_name || '',
    company: data.company_name || '',
    description: data.business_description || '',
    years: data.years_in_business || '',
    employees: data.number_of_employees || '',
    phone: data.phone || '',
    email: data.email || '',
    website: data.website_url || '',
    state: data.state || '',
  };

  state.zips = (data.service_zips || '').split(',').map(z=>z.trim()).filter(Boolean);
  state.categories = new Set(
    (data.service_categories || '').split(',').map(c=>c.trim()).filter(Boolean)
  );
  state.servicesDetail = (data.services_detail && typeof data.services_detail==='object') ? data.services_detail : {};
  state.expandedCategory = [...state.categories][0] || null;

  // Unpack the business_hours JSONB: we stash a `_confirmed` sibling flag
  // alongside the per-day entries so `hoursConfirmed` survives reloads
  // without needing a separate DB column.
  const rawHours = (data.business_hours && typeof data.business_hours==='object') ? data.business_hours : defaultHours();
  const hoursConfirmed = !!rawHours._confirmed;
  const hoursOnly = {};
  for(const k of Object.keys(rawHours)){
    if(k === '_confirmed') continue;
    hoursOnly[k] = rawHours[k];
  }
  // If we ended up with an empty hours object (e.g. row had just `{_confirmed:true}`),
  // fall back to defaults so the UI still renders rows to toggle.
  const hoursForState = Object.keys(hoursOnly).length ? hoursOnly : defaultHours();

  state.operations = {
    technicians: data.num_technicians ?? '',
    vehicles: data.num_vehicles ?? '',
    hours: hoursForState,
    hoursConfirmed: hoursConfirmed,
    scheduling: data.scheduling_system || '',
    phoneAnswered: data.phone_answered_by || '',
    payments: new Set(Array.isArray(data.payment_methods) ? data.payment_methods : []),
  };

  state.credentials.insurance = {
    carrier: data.insurance_carrier || '',
    policy: data.insurance_policy_number || '',
    exp: data.insurance_expiration || '',
    file: data.insurance_doc_url || '',
    verified: !!data.insurance_verified,
  };

  // Notification prefs (default to on for email+sms, off for digest).
  state.notifs = {
    email: data.notif_email ?? true,
    sms: data.notif_sms ?? true,
    digest: data.notif_digest ?? false,
  };

  // Agreement status
  if(data.agreement_accepted_at){
    state.agreementRecord = {
      agreement_accepted_at: data.agreement_accepted_at,
      agreement_accepted_ip: data.agreement_accepted_ip,
      agreement_version: data.agreement_version,
      agreement_signed_name: data.agreement_signed_name,
    };
  }

  // Load licenses
  const { data: licRows, error: licErr } = await sb.from('contractor_licenses')
    .select('*').eq('contractor_id', data.id).order('created_at', { ascending: true });
  if(licErr) console.error('loadLicenses failed', licErr);
  state.credentials.licenses = (licRows || []).map(r=>({
    id: r.id,
    trade: r.trade_category || '',
    type: r.license_type || '',
    state: r.license_state || '',
    number: r.license_number || '',
    exp: r.expiration_date || '',
    file: r.document_url || '',
    verified: !!r.verified,
    verifiedAt: r.verified_at || null,
    notes: r.notes || '',
  }));

  // Nav avatar / name
  const initials = ((data.first_name||'?')[0] + (data.last_name||'')[0]).toUpperCase();
  const navAvatar = document.getElementById('navAvatar');
  if(navAvatar) navAvatar.textContent = initials || '··';
  const navName = document.getElementById('navName');
  if(navName) navName.textContent = [data.first_name, data.last_name].filter(Boolean).join(' ') || data.email || '—';

  return true;
}

async function loadLeads(){
  if(!state.contractorId){ state.leads=[]; return; }
  const { data, error } = await sb.from('leads')
    .select('*')
    .eq('assigned_contractor_id', state.contractorId)
    .order('created_at', { ascending: false })
    .limit(50);
  if(error){ console.error('loadLeads failed', error); state.leads=[]; return; }
  // Normalize DB row -> UI lead shape (adds .mins, .status lowercased for
  // filter buttons, keeps .created_at for response-time math).
  state.leads = (data||[]).map(r => normalizeLead(r));
}

function normalizeLead(r){
  const createdMs = r.created_at ? new Date(r.created_at).getTime() : Date.now();
  const mins = Math.max(0, Math.floor((Date.now() - createdMs)/60000));
  const statusMap = { 'New':'new', 'Accepted':'accepted', 'Passed':'passed', 'Expired':'expired' };
  const uiStatus = statusMap[r.status] || (r.status||'new').toLowerCase();
  return {
    ...r,
    id: r.id,
    service: r.service_category || r.service || '',
    urgency: r.urgency || 'Soon',
    name: r.homeowner_name || r.customer_name || r.name || '',
    zip: r.homeowner_zip || r.customer_zip || r.zip || '',
    phone: r.homeowner_phone || r.customer_phone || r.phone || '',
    email: r.homeowner_email || r.customer_email || r.email || '',
    address: r.homeowner_address || r.customer_address || r.address || '',
    desc: r.description || r.desc || '',
    budget: r.budget || '',
    prop: r.property_type || r.prop || '',
    contact: r.preferred_contact || r.contact || '',
    fee: r.lead_fee || 29,
    mins,
    status: uiStatus,
    created_at: r.created_at,
  };
}

// Silent poll while on Leads tab
let leadPollTimer = null;
function startLeadPoll(){
  stopLeadPoll();
  leadPollTimer = setInterval(async ()=>{
    if(state.activeTab!=='leads'){ return; }
    await loadLeads();
    render();
  }, 60000);
}
function stopLeadPoll(){ if(leadPollTimer){ clearInterval(leadPollTimer); leadPollTimer=null; } }

// ==================== FATAL ERROR SCREEN ====================
function showFatalError(msg){
  document.body.removeAttribute('data-loading');
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;background:#faf9f6">
      <div style="max-width:440px;text-align:center;font-family:'DM Sans',sans-serif">
        <div style="font-family:'DM Sans',sans-serif;font-size:28px;color:#0a1628;margin-bottom:10px">Something's off</div>
        <p style="color:#4b5563;font-size:15px;line-height:1.5;margin-bottom:20px">${msg}</p>
        <a href="mailto:support@selectservicepros.com" style="display:inline-block;padding:10px 18px;border-radius:10px;background:#0a1628;color:#fff;text-decoration:none;font-weight:600;font-size:14px">Contact support</a>
      </div>
    </div>
  `;
}

// ==================== AUTH ====================
async function logout(){
  try { await sb.auth.signOut(); } catch(e){ console.error(e); }
  window.location.href = '/contractor-login.html';
}

async function changePassword(){
  const email = state.profile.email;
  if(!email){ toast('No email on file','error'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/contractor-login.html'
  });
  if(error) toast('Could not send reset email','error');
  else toast('Check your email for a password reset link','success');
}

async function deleteAccount(){
  if(!state.contractorId) return;
  try {
    await sb.from('contractors').update({ status: 'Deleted' }).eq('id', state.contractorId);
    await sb.auth.signOut();
    window.location.href = '/';
  } catch(e){
    console.error('deleteAccount failed', e);
    toast('Could not delete account','error');
  }
}

sb.auth.onAuthStateChange((event)=>{
  if(event==='SIGNED_OUT'){ window.location.href = '/contractor-login.html'; return; }
  // If the Supabase SDK detects a recovery-type token in the URL (e.g. the user
  // clicked the "set your password" link from the welcome email), it fires a
  // PASSWORD_RECOVERY event. Without this redirect, the user lands on the
  // dashboard in a half-authenticated state that trips RLS / "Something's off".
  // Send them to the dedicated reset page instead.
  if(event==='PASSWORD_RECOVERY'){
    window.location.href = '/reset-password.html' + window.location.hash;
    return;
  }
});

// ==================== INIT ====================
async function init(){
  // Set UI layout from defaults (no more tweak panel).
  document.body.dataset.banner = state.banner;
  document.body.dataset.nav = state.nav;

  const { data: { session } } = await sb.auth.getSession();
  if(!session){
    // Preview-sandbox bypass: when there's no session but we're clearly not
    // on a production host, render an empty shell instead of bouncing to
    // login. Matches localhost, Claude artifact hosts, and any iframe.
    const h = location.hostname;
    const isPreview =
      h==='localhost' || h==='127.0.0.1' ||
      h.endsWith('.sandbox.dev') ||
      h.endsWith('.claude.site') ||
      h.endsWith('.claudeusercontent.com') ||
      h.endsWith('.preview.app') ||
      window.self !== window.top;
    if(isPreview){
      // 'pending' is the initial onboarding state used by updateNav()'s
      // status map — not a made-up key.
      state.state = 'pending';
      state.authUser = { email: 'preview@example.com' };
      state.profile.email = 'preview@example.com';
      document.body.removeAttribute('data-loading');
      render();
      return;
    }
    window.location.href = '/contractor-login.html';
    return;
  }
  state.authUser = session.user;
  state.profile.email = session.user.email || '';

  const ok = await loadContractor(session.user.id);
  if(!ok) return;
  await loadLeads();

  document.body.removeAttribute('data-loading');
  render();
  startLeadPoll();
}

init();

// keyboard: arrow keys on tabs
document.addEventListener('keydown',(e)=>{
  if(e.target.matches('input,textarea,select')) return;
  if(e.key==='ArrowRight' || e.key==='ArrowLeft'){
    const idx = TABS.findIndex(t=>t.key===state.activeTab);
    const next = (idx + (e.key==='ArrowRight'?1:-1) + TABS.length) % TABS.length;
    setTab(TABS[next].key);
  }
});
